add_newline = false

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[directory]
style = "bold #7AA2F7"
truncation_length = 2
truncate_to_repo = false

[git_branch]
symbol = " "
style = "bold #9ECE6A"
format = "[ $symbol$branch]($style) "

[git_status]
style = "bold #F7768E"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "bold #E0AF68"
format = "[ $duration]($style) "

[character]
success_symbol = "[❯](#BB9AF7)"
error_symbol = "[❯](#F7768E)"

[lua]
disabled = true
